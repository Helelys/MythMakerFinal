<select id="select" (change)="onChange($event)">
    <option value="">Selecione um sistema</option>
    <option value="ordem">Ordem</option>
    <option value="dnd">Dungeons & Dragons</option>
</select>
@if (seletor === 'ordem') {
    <app-missao-gerador></app-missao-gerador>
} @else if (seletor === 'dnd') {
    <app-missao-gerador-dnd></app-missao-gerador-dnd>
} @else if (seletor === '') {
    <p>Selecione um sistema para gerar uma missão</p>
}
